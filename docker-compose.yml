version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      
      - .:/app
      
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000    
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
